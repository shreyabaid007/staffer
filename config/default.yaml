weights:
  skill: 0.7
  feedback: 0.3

ranking:
  top_k: 5

availability:
  window_days: 14

# Skill adjacency seed (AD-035) — symmetric map skill → adjacent skills, normalised lowercase.
# Drives desired-skill partial credit at score time (exact desired = 1.0, adjacent = 0.5, else 0;
# AD-033). A HARD skill is NEVER credited via adjacency (enforced in code, tech.md rule 5).
# Config-driven + expandable; names mirror the taxonomy's lowercase ids.
adjacency_map:
  kotlin: ["java"]
  java: ["kotlin"]
  react: ["next.js"]
  next.js: ["react"]
  typescript: ["javascript"]
  javascript: ["typescript"]
  aws: ["gcp"]
  gcp: ["aws"]
  docker: ["kubernetes"]
  kubernetes: ["docker"]
  postgres: ["mysql", "sql"]
  mysql: ["postgres", "sql"]
  sql: ["postgres", "mysql"]
  spark: ["dbt", "airflow"]
  dbt: ["spark", "airflow"]
  airflow: ["spark", "dbt"]
  selenium: ["cypress", "playwright"]
  cypress: ["selenium", "playwright"]
  playwright: ["selenium", "cypress"]
  llm: ["rag", "vector"]
  rag: ["llm", "vector"]
  vector: ["llm", "rag"]
  ml: ["scikit-learn"]
  scikit-learn: ["ml"]

models:
  reasoning_llm: "openrouter/anthropic/claude-sonnet-4-6"
  embedder: "BAAI/bge-base-en-v1.5"
  reranker: "BAAI/bge-reranker-base"

# TokenOps proxy integration (cost tracking + semantic caching).
# When enabled, all PseudonymisedLM calls route through the TokenOps proxy
# instead of hitting OpenRouter directly. The proxy tracks cost, caches
# semantically similar prompts, and optionally routes to cheaper models.
# Set TOKENOPS_API_KEY in env if the proxy requires auth.
tokenops:
  enabled: true
  base_url: "https://shreyabaid007--tokenops-proxy-fastapi-app.modal.run/v1"
  # "auto" = let TokenOps classifier pick the model; "passthrough" = honor our model choice
  route: "auto"
  # "skip" = bypass semantic cache (every call hits the LLM); omit or "enabled" = use cache
  cache: "skip"

# Ingest enrich stage (a-003). prompt_version bumps when config/prompts/* change; model_version is
# sourced from models.reasoning_llm (single source of truth). A bump forces re-extraction (§11).
enrich:
  prompt_version: "enrich-v1"
  temperature: 0

# Snapshot reconciliation (a-003, AD-070). Warn when the latest snapshot is older than this many
# days; the refuse-vs-role-start half of the guard is enforced at match time.
reconcile:
  max_staleness_days: 30

# Index build + upsert (a-005). The Milvus Lite store the indexer writes; the CLI passes these to
# MilvusIndexStore (the store reads no config itself — mirrors rank, AD-064). The embedder id used as
# the re-embed gate (model_version, AD-082) is sourced from models.embedder, not duplicated here.
index:
  milvus:
    db_path: "data/index/milvus.db"
    collection: "candidates"
    dense_metric: "IP"
  # Query-time hybrid recall (b-002, AD-089; default flipped ON by AD-109). ENABLED by default so the
  # retrieval axis is exercised + measurable (the AD-106 metrics assume ON). Passthrough when OFF; on
  # a store/embed error while ON it falls back to exhaustive passthrough (never drops candidates). At
  # single-digit gated POC pools there is little to narrow — set `enabled: false` to force the
  # exhaustive path. top_n bounds the dense/BM25/RRF fan-out.
  recall:
    enabled: true
    top_n: 100
  # Cross-encoder rerank (b-002, AD-071): truncate the recalled pool to top_k before LLM scoring.
  # Narrows which candidates get scored — NOT the final sort (step 9 rank decides order).
  rerank:
    top_k: 10

# Natural-language query intake (c-006, AD-110/AD-111). The `dsm match --query "<prose>"` front
# door parses free text into the EXISTING OpenRole via a single-shot DSPy Predict over
# PseudonymisedLM (pass-through — role text is non-PII). The model id is reused from
# `models.reasoning_llm` (single source of truth — not duplicated here).
nl_intake:
  # Pinned prompt derivation version (AD-066). BUMP whenever config/prompts/role_intake.md changes:
  # it is part of the parse cache key, so a silent prompt edit would otherwise reuse a stale parse.
  prompt_version: "intake-v2"  # bumped for the c-007 generalised location-negation rule
  # Pinned LM temperature — the intake parse must be deterministic (the existing clarify/score
  # builders rely on the dspy default; intake pins it explicitly). NO dspy.Refine (temp 1.0).
  temperature: 0
  # Plausibility SANITY BOUND (not a gate parameter): reject a resolved start date more than this
  # many days in the future (or any date before today) before it reaches the availability gate.
  max_horizon_days: 730
  # Content-addressed parse cache (key = sha256 of normalised prose | run-date | model_id |
  # prompt_version). Lands under the already-gitignored data/.cache/* — never committed.
  cache_dir: "data/.cache/nl_intake"

# PII boundary (c-003, AD-101/098). The persistent identity vault path is a CLI option
# (`--vault-path`, mirrors `--gold-dir`) and defaults alongside gold at `data/identity/vault.json`
# (gitignored). `ner_enabled` toggles the Presidio NER residual pass at the outbound boundary; the
# deterministic vault-backed strip + outbound leak-scan stay the load-bearing guarantee either way.
pii:
  ner_enabled: true

# Web frontend (c-008, AD-113). The thin FastAPI JSON API + single static page over the same spine.
# host/port are read ONLY by `dsm serve` (uvicorn); the app logic itself is transport-agnostic. The
# page is served same-origin, so no CORS. No auth (localhost POC) — see docs/product.md § Out of scope.
web:
  host: "127.0.0.1"
  port: 8000

# Guardrails AI defence-in-depth validation layer (c-009, AD-XXX). A COMPLEMENTARY input/output
# content-safety layer around the PseudonymisedLM call sites — it does NOT replace the PII boundary
# (AD-101/102), the deterministic gates (AD-002), or the verbatim citation check (AD-073). Wired at
# the composition root (dsm/cli/commands.py); dsm.match never imports dsm.guardrails. Each validator
# is independently toggleable. guardrails-ai + its hub validators are an OPTIONAL, eval-tier extra
# (`pip install 'staffer[guardrails]'` + `guardrails hub install ...`); when absent each guard
# degrades to a logged no-op (make check stays hermetic). Score-bounds clamping is unconditional
# pure Python (also enforced by the frozen ScoreExtraction validator, AD-030) — no toggle here.
guardrails:
  enabled: true  # master toggle — false bypasses every guard (zero overhead)
  input:
    # Prompt-injection / jailbreak detection on untrusted candidate text (guardrails/detect_jailbreak,
    # local HF model). Runs before redaction + the LLM call; on detection the candidate is skipped.
    jailbreak_detection:
      enabled: true
      threshold: 0.81  # detect_jailbreak score threshold (higher = stricter)
  output:
    # Narrative-prose grounding vs the candidate's source context (bespokelabs/bespoke_minicheck).
    # Remote API (needs BESPOKE_API_KEY) → eval-tier; complements citation verification (AD-073).
    grounding:
      enabled: true
      threshold: 0.5
  narrative:
    # Age/gender/ethnicity bias screening on human-facing narratives (guardrails/bias_check, local).
    bias_check:
      enabled: true
      threshold: 0.9
    # Toxic / unprofessional language screening (guardrails/toxic_language, local).
    toxicity:
      enabled: true
      threshold: 0.5

# MIPROv2 offline compilation (AD-XXX). Compile DSPy signatures against the golden set for
# A/B comparison with hand-written prompts. Compiled artefacts are versioned files under
# `artifacts/` — never auto-deployed (AD-066 determinism invariant preserved).
compile:
  teacher_model: "openrouter/anthropic/claude-opus-4-6"
  auto: "light"       # conservative: 21 golden cases < 50 typical MIPROv2 minimum
  num_threads: 4
  artifacts_dir: "artifacts"

logging:
  level: "INFO"
