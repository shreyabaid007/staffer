weights:
  skill: 0.7
  feedback: 0.3

ranking:
  top_k: 5

availability:
  window_days: 14

# Skill adjacency seed (AD-035) — symmetric map skill → adjacent skills, normalised lowercase.
# Drives desired-skill partial credit at score time (exact desired = 1.0, adjacent = 0.5, else 0;
# AD-033). A HARD skill is NEVER credited via adjacency (enforced in code, tech.md rule 5).
# Config-driven + expandable; names mirror the taxonomy's lowercase ids.
adjacency_map:
  kotlin: ["java"]
  java: ["kotlin"]
  react: ["next.js"]
  next.js: ["react"]
  typescript: ["javascript"]
  javascript: ["typescript"]
  aws: ["gcp"]
  gcp: ["aws"]
  docker: ["kubernetes"]
  kubernetes: ["docker"]
  postgres: ["mysql", "sql"]
  mysql: ["postgres", "sql"]
  sql: ["postgres", "mysql"]
  spark: ["dbt", "airflow"]
  dbt: ["spark", "airflow"]
  airflow: ["spark", "dbt"]
  selenium: ["cypress", "playwright"]
  cypress: ["selenium", "playwright"]
  playwright: ["selenium", "cypress"]
  llm: ["rag", "vector"]
  rag: ["llm", "vector"]
  vector: ["llm", "rag"]
  ml: ["scikit-learn"]
  scikit-learn: ["ml"]

models:
  reasoning_llm: "openrouter/anthropic/claude-sonnet-4-6"
  embedder: "BAAI/bge-base-en-v1.5"
  reranker: "BAAI/bge-reranker-base"

# Ingest enrich stage (a-003). prompt_version bumps when config/prompts/* change; model_version is
# sourced from models.reasoning_llm (single source of truth). A bump forces re-extraction (§11).
enrich:
  prompt_version: "enrich-v1"
  temperature: 0

# Snapshot reconciliation (a-003, AD-070). Warn when the latest snapshot is older than this many
# days; the refuse-vs-role-start half of the guard is enforced at match time.
reconcile:
  max_staleness_days: 30

# Index build + upsert (a-005). The Milvus Lite store the indexer writes; the CLI passes these to
# MilvusIndexStore (the store reads no config itself — mirrors rank, AD-064). The embedder id used as
# the re-embed gate (model_version, AD-082) is sourced from models.embedder, not duplicated here.
index:
  milvus:
    db_path: "data/index/milvus.db"
    collection: "candidates"
    dense_metric: "IP"
  # Query-time hybrid recall (b-002, AD-089). DEFERRED: OFF by default — at POC-scale gated pools
  # there is nothing to narrow. Flip `enabled: true` (a config change, not code) when the
  # post-exact-filter pool routinely exceeds ~150. top_n bounds the dense/BM25/RRF fan-out.
  recall:
    enabled: true
    top_n: 100
  # Cross-encoder rerank (b-002, AD-071): truncate the recalled pool to top_k before LLM scoring.
  # Narrows which candidates get scored — NOT the final sort (step 9 rank decides order).
  rerank:
    top_k: 10

# PII boundary (c-003, AD-101/098). The persistent identity vault path is a CLI option
# (`--vault-path`, mirrors `--gold-dir`) and defaults alongside gold at `data/identity/vault.json`
# (gitignored). `ner_enabled` toggles the Presidio NER residual pass at the outbound boundary; the
# deterministic vault-backed strip + outbound leak-scan stay the load-bearing guarantee either way.
pii:
  ner_enabled: true

logging:
  level: "INFO"
